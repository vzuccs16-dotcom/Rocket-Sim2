<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rocket Sim</title>
<style>
/* ─── Reset ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#06070f;overflow:hidden;touch-action:none}

/* ─── Layout ──────────────────────────────────────────── */
#root{display:flex;flex-direction:column;height:100dvh;min-height:100vh;font-family:'Courier New',monospace;background:#06070f}
#cw{flex:1;position:relative;overflow:hidden;min-height:0}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}

/* ─── Bottom panel ────────────────────────────────────── */
#ui{background:#0b0c1c;border-top:1px solid #1c1e3a;padding:6px 8px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;max-height:42vh;overflow-y:auto}
.row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.grp{background:#0f1028;border:1px solid #1c1e3a;border-radius:8px;padding:6px 8px;display:flex;flex-direction:column;gap:4px;flex:1;min-width:100px}
.gl{font-size:9px;color:#404368;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
.cr{display:flex;align-items:center;gap:4px}
.cr label{font-size:10px;color:#707ab0;min-width:44px}
.cr input[type=range]{flex:1;height:4px;accent-color:#6b7ff5;min-width:36px;cursor:pointer}
.cr span{font-size:10px;color:#a8b0f0;min-width:30px;text-align:right}
.cr input[type=color]{width:24px;height:22px;border:none;background:none;cursor:pointer;padding:0}
.cr input[type=checkbox]{accent-color:#6b7ff5;width:14px;height:14px;cursor:pointer}
.cr input[type=text]{flex:1;background:#06070f;color:#8890c8;border:1px solid #222450;border-radius:4px;padding:2px 5px;font-size:10px;font-family:inherit}

/* ─── Buttons ─────────────────────────────────────────── */
.btn{background:#151730;color:#7880b8;border:1px solid #222450;border-radius:6px;padding:5px 9px;font-size:10px;font-family:inherit;cursor:pointer;transition:background .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover,.btn:active{background:#222450;color:#c0c8ff}
.btn.pri{background:#4a5ad0;color:#fff;border-color:#4a5ad0}.btn.pri:hover,.btn.pri:active{background:#6b7ff5}
.btn.red{background:#6a1010;color:#ffaaaa;border-color:#6a1010}.btn.red:hover,.btn.red:active{background:#a02020;color:#fff}
.btn.grn{background:#0d4a28;color:#80ffaa;border-color:#0d4a28}.btn.grn:hover,.btn.grn:active{background:#156b3a;color:#fff}
.btn.ora{background:#6a3a08;color:#ffcc80;border-color:#6a3a08}.btn.ora:hover,.btn.ora:active{background:#a05a10;color:#fff}

/* ─── Status bar ──────────────────────────────────────── */
#badge{font-size:9px;padding:2px 8px;border-radius:9px;background:#111438;color:#6b7ff5;border:1px solid #202860;white-space:nowrap}
#status{font-size:10px;color:#5a60a0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── Tabs ────────────────────────────────────────────── */
.tabs{display:flex;gap:3px}
.tab{background:#0f1028;color:#404368;border:1px solid #1c1e3a;border-radius:5px;padding:4px 10px;font-size:10px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab.on{background:#1c1e3a;color:#9090d8;border-color:#303480}

/* ─── Planet list ─────────────────────────────────────── */
#plist{display:flex;flex-direction:column;gap:3px;max-height:80px;overflow-y:auto}
.pi{display:flex;gap:4px;align-items:center;background:#080918;border-radius:4px;padding:3px 6px;font-size:9px;color:#5868a0}
.pi .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pi .pn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi button{background:none;border:none;color:#5a2020;cursor:pointer;font-size:12px;padding:0 3px;line-height:1}
.pi button:hover{color:#e74c3c}

/* ─── Orbit HUD ───────────────────────────────────────── */
#orbit-hud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(6,7,15,0.88);border:1px solid #1c1e3a;border-radius:8px;padding:6px 16px;font-size:11px;color:#6b7ff5;display:none;white-space:nowrap;text-align:center;pointer-events:none;font-family:'Courier New',monospace;z-index:10}

/* ─── Mobile overlay ──────────────────────────────────── */
#mob-overlay{position:absolute;inset:0;pointer-events:none;z-index:20}
#mob-joystick-zone{position:absolute;bottom:16px;left:16px;width:110px;height:110px;pointer-events:auto}
#mob-jbase{position:absolute;inset:0;border-radius:50%;background:rgba(107,127,245,0.1);border:2px solid rgba(107,127,245,0.28)}
#mob-jnub{position:absolute;width:38px;height:38px;border-radius:50%;background:rgba(107,127,245,0.65);border:2px solid #6b7ff5;top:50%;left:50%;transform:translate(-50%,-50%)}
#mob-btns{position:absolute;bottom:16px;right:12px;display:flex;flex-direction:column;gap:7px;pointer-events:auto}
.mbb{width:58px;height:42px;border-radius:10px;border:2px solid;font-size:11px;font-family:'Courier New',monospace;font-weight:bold;cursor:pointer;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;user-select:none}
#mb-launch{background:rgba(106,58,8,0.88);color:#ffcc80;border-color:#a05a10}
#mb-prev{background:rgba(74,90,208,0.88);color:#c0d0ff;border-color:#4a5ad0}
#mb-reset{background:rgba(106,16,16,0.88);color:#ffaaaa;border-color:#a02020}
#mb-fit{background:rgba(15,16,40,0.88);color:#8890c8;border-color:#222450}
#mob-zoom{position:absolute;top:12px;right:12px;display:flex;gap:6px;pointer-events:auto}
.mzb{width:40px;height:40px;border-radius:8px;background:rgba(15,16,40,0.88);border:1px solid #222450;color:#8890c8;font-size:20px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}

/* hide desktop btn row on mobile, show overlay */
@media(max-width:680px){
  #desk-btns{display:none!important}
  #mob-overlay{display:block}
}
@media(min-width:681px){
  #mob-overlay{display:none!important}
}
</style>
</head>
<body>
<div id="root">
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="orbit-hud"></div>

    <div id="mob-overlay">
      <div id="mob-zoom">
        <button class="mzb" id="mb-zm">−</button>
        <button class="mzb" id="mb-zp">+</button>
      </div>
      <div id="mob-joystick-zone">
        <div id="mob-jbase"></div>
        <div id="mob-jnub"></div>
      </div>
      <div id="mob-btns">
        <button class="mbb" id="mb-prev">PREV</button>
        <button class="mbb" id="mb-launch">GO!</button>
        <button class="mbb" id="mb-fit">FIT</button>
        <button class="mbb" id="mb-reset">RST</button>
      </div>
    </div>
  </div>

  <div id="ui">
    <div class="row" style="justify-content:space-between">
      <div class="row" style="gap:5px;flex:1;min-width:0">
        <span id="badge">PLACE ROCKET</span>
        <span id="status">Tap canvas to place rocket</span>
      </div>
      <div class="row" id="desk-btns" style="gap:4px;flex-shrink:0">
        <button class="btn" id="zm">−</button>
        <button class="btn" id="zp">+</button>
        <button class="btn" id="zfit">fit</button>
        <button class="btn pri" id="bprev">Preview</button>
        <button class="btn ora" id="blaunch">Launch</button>
        <button class="btn red" id="breset">Reset</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" data-t="rocket">🚀 Rocket</button>
      <button class="tab" data-t="planet">🪐 Planets</button>
      <button class="tab" data-t="sim">⚙️ Sim</button>
    </div>
    <div id="t-rocket">
      <div class="row">
        <div class="grp"><div class="gl">Thrust</div>
          <div class="cr"><label>Power</label><input type="range" id="thrust" min="100" max="2500" value="700" step="10"><span id="vthrust">700</span></div>
          <div class="cr"><label>Angle</label><input type="range" id="angle" min="0" max="360" value="90" step="1"><span id="vangle">90°</span></div>
          <div class="cr"><label>Fuel</label><input type="range" id="fuel" min="50" max="900" value="450" step="10"><span id="vfuel">450</span></div>
        </div>
        <div class="grp"><div class="gl">Rocket</div>
          <div class="cr"><label>Mass</label><input type="range" id="mass" min="1" max="30" value="8" step="1"><span id="vmass">8</span></div>
          <div class="cr"><label>Burn</label><input type="range" id="burnrate" min="1" max="20" value="3" step="1"><span id="vburn">3</span></div>
          <div class="cr"><label>Color</label><input type="color" id="rcol" value="#6b7ff5"></div>
        </div>
      </div>
    </div>
    <div id="t-planet" style="display:none">
      <div class="row">
        <div class="grp"><div class="gl">New Planet</div>
          <div class="cr"><label>Mass</label><input type="range" id="pm" min="1000" max="30000" value="9000" step="100"><span id="vpm">9000</span></div>
          <div class="cr"><label>Radius</label><input type="range" id="pr" min="15" max="120" value="45" step="1"><span id="vpr">45</span></div>
          <div class="cr"><label>Color</label><input type="color" id="pc" value="#3a8fff"></div>
          <div class="cr"><label>Name</label><input type="text" id="pname" value="Planet"></div>
          <button class="btn grn" id="badd" style="width:100%;margin-top:3px">Tap canvas to place</button>
        </div>
        <div class="grp" style="flex:1.3"><div class="gl">Planets</div><div id="plist"></div></div>
      </div>
    </div>
    <div id="t-sim" style="display:none">
      <div class="row">
        <div class="grp"><div class="gl">Physics</div>
          <div class="cr"><label>Gravity</label><input type="range" id="grav" min="200" max="4000" value="1200" step="10"><span id="vgrav">1200</span></div>
          <div class="cr"><label>Timestep</label><input type="range" id="dt" min="1" max="12" value="4" step="1"><span id="vdt">4</span></div>
          <div class="cr"><label>Drag</label><input type="range" id="drag" min="0" max="30" value="4" step="1"><span id="vdrag">4</span></div>
        </div>
        <div class="grp"><div class="gl">Display</div>
          <div class="cr"><label>Trail</label><input type="range" id="trail" min="30" max="600" value="200" step="10"><span id="vtrail">200</span></div>
          <div class="cr" style="gap:6px"><input type="checkbox" id="cvec" checked><label style="min-width:auto;cursor:pointer" for="cvec">Grav arrows</label></div>
          <div class="cr" style="gap:6px"><input type="checkbox" id="cfield"><label style="min-width:auto;cursor:pointer" for="cfield">Field lines</label></div>
          <div class="cr" style="gap:6px"><input type="checkbox" id="cgrid" checked><label style="min-width:auto;cursor:pointer" for="cgrid">Grid</label></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ================================================================
   ██████╗  ██████╗  ██████╗██╗  ██╗███████╗████████╗    ███████╗██╗███╗   ███╗
   ██╔══██╗██╔═══██╗██╔════╝██║ ██╔╝██╔════╝╚══██╔══╝    ██╔════╝██║████╗ ████║
   ██████╔╝██║   ██║██║     █████╔╝ █████╗     ██║       ███████╗██║██╔████╔██║
   ██╔══██╗██║   ██║██║     ██╔═██╗ ██╔══╝     ██║       ╚════██║██║██║╚██╔╝██║
   ██║  ██║╚██████╔╝╚██████╗██║  ██╗███████╗   ██║       ███████║██║██║ ╚═╝ ██║
   ╚═╝  ╚═╝ ╚═════╝  ╚═════╝╚═╝  ╚═╝╚══════╝   ╚═╝       ╚══════╝╚═╝╚═╝     ╚═╝

  ╔══════════════════════════════════════════════════════════════════╗
  ║                    ✏️  EASY CONFIG — EDIT HERE                   ║
  ║  All tunable values live in this one object. Change anything    ║
  ║  below and save to instantly see the effect in-browser.         ║
  ╚══════════════════════════════════════════════════════════════════╝ */

const CONFIG = {

  // ── Physics ──────────────────────────────────────────────────────
  // G_CONST      gravitational constant (200=light, 1200=default, 4000=crushing)
  // TIMESTEP     sim steps per frame (1=slow & accurate, 12=fast & rough)
  // DRAG         space drag on the rocket (0=none, 30=heavy)
  G_CONST:   1200,
  TIMESTEP:     4,
  DRAG:         4,

  // ── Rocket ───────────────────────────────────────────────────────
  // THRUST       engine force (100=weak, 700=default, 2500=very strong)
  // FUEL         starting fuel units
  // MASS         dry mass (lower = lighter, more agile)
  // BURN_RATE    fuel burned per second (lower = burns longer)
  // ROCKET_COLOR hex string for rocket body colour
  THRUST:     700,
  FUEL:       450,
  MASS:         8,
  BURN_RATE:    3,
  ROCKET_COLOR: '#6b7ff5',

  // ── Landing rules ─────────────────────────────────────────────────
  // ORBIT_DEG_REQ  degrees of orbit needed before landing unlocks
  //                180 = easy half-orbit, 270 = default, 360 = full circle
  // LAND_SPD_MAX   max inward speed for a safe landing (higher = more forgiving)
  // ORBIT_RANGE_MX planet-radius multiplier: how far away orbit-tracking activates
  ORBIT_DEG_REQ:  270,
  LAND_SPD_MAX:   3.5,
  ORBIT_RANGE_MX: 5.5,

  // ── Display ───────────────────────────────────────────────────────
  TRAIL_LEN:    200,
  SHOW_GRID:    true,
  SHOW_VECTORS: true,
  SHOW_FIELD:   false,

  // ── Planets ───────────────────────────────────────────────────────
  // Each entry: { wx, wy, mass, radius, color, name }
  //   wx/wy    world position (0,0 is centre of the map)
  //   mass     gravity mass — roughly 1000–25000 is sensible
  //   radius   collision + visual radius in world units
  PLANETS: [
    { wx:    0, wy:  100, mass: 14000, radius:  72, color: '#3a8fff', name: 'Earth'   },
    { wx: -700, wy: -320, mass:  5500, radius:  42, color: '#e06030', name: 'Mars'    },
    { wx:  780, wy: -260, mass:  8000, radius:  55, color: '#c8a820', name: 'Venus'   },
    { wx: -980, wy:  500, mass:  3000, radius:  28, color: '#d060d0', name: 'Pluto'   },
    { wx:  580, wy:  680, mass: 22000, radius:  95, color: '#c07828', name: 'Jupiter' },
    { wx: -460, wy:  780, mass:  3200, radius:  26, color: '#60b0e0', name: 'Uranus'  },
    { wx: 1000, wy:  220, mass: 10000, radius:  65, color: '#e8b050', name: 'Saturn'  },
  ],
};

/* ================================================================
   END OF CONFIG — hack the simulation logic below at your own risk!
   ================================================================ */

// ── Canvas ────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const cw     = document.getElementById('cw');
const orbitHud = document.getElementById('orbit-hud');
let W = 0, H = 0;
function resize() {
  const r = cw.getBoundingClientRect();
  W = canvas.width  = Math.floor(r.width)  || 600;
  H = canvas.height = Math.floor(r.height) || 400;
}
resize(); new ResizeObserver(resize).observe(cw);

// ── Camera ────────────────────────────────────────────────────────
const cam = { x: 0, y: 0, zoom: 1 };
const wtc = (wx,wy) => ({ x:(wx-cam.x)*cam.zoom+W/2, y:(wy-cam.y)*cam.zoom+H/2 });
const ctw = (cx,cy) => ({ x:(cx-W/2)/cam.zoom+cam.x, y:(cy-H/2)/cam.zoom+cam.y });

// ── State ─────────────────────────────────────────────────────────
let planets    = CONFIG.PLANETS.map(p=>({...p}));
let rocket=null, sim=null, simTrail=[], previewPath=[], mode='placeRocket', tick=0, simRunning=false, pcount=CONFIG.PLANETS.length;
let orbitTracker = { planet:null, lastAngle:0, totalAngle:0, landingWindow:false };

// ── Apply config defaults to sliders ─────────────────────────────
;(()=>{
  const s=(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;};
  s('thrust',CONFIG.THRUST); s('angle',90); s('fuel',CONFIG.FUEL);
  s('mass',CONFIG.MASS); s('burnrate',CONFIG.BURN_RATE);
  s('grav',CONFIG.G_CONST); s('dt',CONFIG.TIMESTEP); s('drag',CONFIG.DRAG);
  s('trail',CONFIG.TRAIL_LEN); s('rcol',CONFIG.ROCKET_COLOR);
  document.getElementById('cvec').checked   = CONFIG.SHOW_VECTORS;
  document.getElementById('cfield').checked = CONFIG.SHOW_FIELD;
  document.getElementById('cgrid').checked  = CONFIG.SHOW_GRID;
})();

// ── Slider labels ─────────────────────────────────────────────────
const SLIDERS=[['thrust','vthrust',''],['angle','vangle','°'],['fuel','vfuel',''],['mass','vmass',''],['burnrate','vburn',''],['pm','vpm',''],['pr','vpr',''],['grav','vgrav',''],['dt','vdt',''],['drag','vdrag',''],['trail','vtrail','']];
const syncL=()=>SLIDERS.forEach(([id,vid,s])=>{const e=document.getElementById(id),v=document.getElementById(vid);if(e&&v)v.textContent=e.value+s;});
document.querySelectorAll('input[type=range]').forEach(el=>el.addEventListener('input',()=>{syncL();if(mode==='preview')computePreview();}));
syncL();

// ── Tabs ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); t.classList.add('on');
  ['rocket','planet','sim'].forEach(n=>{ document.getElementById('t-'+n).style.display=t.dataset.t===n?'':'none'; });
}));

// ── Mode ──────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  const L={
    placeRocket:['PLACE ROCKET','Tap canvas to set rocket position'],
    addPlanet:  ['ADD PLANET',  'Tap canvas to place — Esc to cancel'],
    preview:    ['PREVIEW',     'Orbit '+CONFIG.ORBIT_DEG_REQ+'° then descend slowly to land'],
    simulating: ['SIMULATING',  'Orbit ring → green = landing unlocked'],
  };
  document.getElementById('badge').textContent=L[m][0];
  document.getElementById('status').textContent=L[m][1];
}

// ── Helpers ───────────────────────────────────────────────────────
const hex2rgb=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
const lighten=(h,a)=>'#'+hex2rgb(h).map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('');
const darken =(h,a)=>'#'+hex2rgb(h).map(v=>Math.max(0,  v-a).toString(16).padStart(2,'0')).join('');
const gv=id=>parseFloat(document.getElementById(id).value);

// ── Gravity ───────────────────────────────────────────────────────
function gravity(px,py){
  const G=gv('grav')*0.001; let ax=0,ay=0;
  for(const p of planets){const dx=p.wx-px,dy=p.wy-py,d2=dx*dx+dy*dy,d=Math.sqrt(d2);if(d<2)continue;const f=G*p.mass/d2;ax+=f*dx/d;ay+=f*dy/d;}
  return{ax,ay};
}

// ── Path sim ──────────────────────────────────────────────────────
function simulatePath(sx,sy,vx0,vy0,fuel0,steps){
  const brate=gv('burnrate'),thrust=gv('thrust'),mass=gv('mass'),dragC=gv('drag')*0.00006,dt=gv('dt')*0.016;
  let px=sx,py=sy,vx=vx0,vy=vy0,fuel=fuel0; const path=[[px,py]];
  for(let i=0;i<steps;i++){
    const{ax,ay}=gravity(px,py);let tx=0,ty=0;
    if(fuel>0){const ang=gv('angle')*Math.PI/180;const thf=thrust/(mass+fuel*0.008);tx=Math.cos(ang)*thf*0.01;ty=-Math.sin(ang)*thf*0.01;fuel-=brate*dt;}
    vx+=(ax+tx)*dt-vx*dragC;vy+=(ay+ty)*dt-vy*dragC;px+=vx*dt;py+=vy*dt;
    path.push([px,py]);
    let hit=false;for(const p of planets){const dx=px-p.wx,dy=py-p.wy;if(Math.sqrt(dx*dx+dy*dy)<p.radius+6){hit=true;break;}}
    if(hit||Math.abs(px)>6000||Math.abs(py)>6000)break;
  }
  return path;
}
function computePreview(){if(!rocket)return;const ang=gv('angle')*Math.PI/180;previewPath=simulatePath(rocket.wx,rocket.wy,Math.cos(ang)*0.2,-Math.sin(ang)*0.2,gv('fuel'),5000);}

// ── Launch ────────────────────────────────────────────────────────
function startSim(){
  if(!rocket)return;
  const ang=gv('angle')*Math.PI/180;
  sim={wx:rocket.wx,wy:rocket.wy,vx:Math.cos(ang)*0.2,vy:-Math.sin(ang)*0.2,fuel:gv('fuel'),maxFuel:gv('fuel'),color:document.getElementById('rcol').value,alive:true,crashed:false,escaped:false,landed:false,landedOn:null};
  simTrail=[];previewPath=[];simRunning=true;
  orbitTracker={planet:null,lastAngle:0,totalAngle:0,landingWindow:false};
  setMode('simulating');
}

function getClosest(wx,wy){let best=null,bestD=Infinity;for(const p of planets){const dx=wx-p.wx,dy=wy-p.wy,d=Math.sqrt(dx*dx+dy*dy)-p.radius;if(d<bestD){bestD=d;best=p;}}return{planet:best,dist:bestD};}

// ── Step ──────────────────────────────────────────────────────────
function stepSim(){
  if(!sim||!sim.alive)return;
  const brate=gv('burnrate'),thrust=gv('thrust'),mass=gv('mass'),dragC=gv('drag')*0.00006,dt=gv('dt')*0.016;
  const{ax,ay}=gravity(sim.wx,sim.wy);let tx=0,ty=0;
  if(sim.fuel>0){const ang=gv('angle')*Math.PI/180;const thf=thrust/(mass+sim.fuel*0.008);tx=Math.cos(ang)*thf*0.01;ty=-Math.sin(ang)*thf*0.01;sim.fuel-=brate*dt;if(sim.fuel<0)sim.fuel=0;}
  sim.vx+=(ax+tx)*dt-sim.vx*dragC;sim.vy+=(ay+ty)*dt-sim.vy*dragC;sim.wx+=sim.vx*dt;sim.wy+=sim.vy*dt;
  simTrail.push([sim.wx,sim.wy,sim.fuel/sim.maxFuel]);
  if(simTrail.length>gv('trail'))simTrail.shift();

  for(const p of planets){
    const dx=sim.wx-p.wx,dy=sim.wy-p.wy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<p.radius+6){
      const rspd=Math.abs(sim.vx*(dx/dist)+sim.vy*(dy/dist));
      if(rspd<CONFIG.LAND_SPD_MAX&&orbitTracker.landingWindow){
        sim.alive=false;sim.landed=true;sim.landedOn=p.name;simRunning=false;orbitHud.style.display='none';
        document.getElementById('status').textContent='✅ Landed on '+p.name+'!';
      } else {
        sim.alive=false;sim.crashed=true;simRunning=false;orbitHud.style.display='none';
        const why=orbitTracker.landingWindow?`Too fast (${rspd.toFixed(1)}, need <${CONFIG.LAND_SPD_MAX})`:'Need '+CONFIG.ORBIT_DEG_REQ+'° orbit first!';
        document.getElementById('status').textContent=`💥 Crashed into ${p.name}! ${why}`;
      }
      return;
    }
  }
  if(Math.abs(sim.wx)>6000||Math.abs(sim.wy)>6000){sim.alive=false;sim.escaped=true;simRunning=false;orbitHud.style.display='none';document.getElementById('status').textContent='🚀 Escaped to space!';return;}

  const{planet:cl,dist:cd}=getClosest(sim.wx,sim.wy);
  if(cd<cl.radius*CONFIG.ORBIT_RANGE_MX){
    const aN=Math.atan2(sim.wy-cl.wy,sim.wx-cl.wx);
    if(orbitTracker.planet===cl){let da=aN-orbitTracker.lastAngle;if(da>Math.PI)da-=2*Math.PI;if(da<-Math.PI)da+=2*Math.PI;orbitTracker.totalAngle+=da;}
    else{orbitTracker.planet=cl;orbitTracker.totalAngle=0;}
    orbitTracker.lastAngle=aN;
    const needed=CONFIG.ORBIT_DEG_REQ*Math.PI/180,orbited=Math.abs(orbitTracker.totalAngle)>=needed;
    orbitTracker.landingWindow=orbited;
    const pct=Math.min(100,Math.abs(orbitTracker.totalAngle)/needed*100);
    orbitHud.style.display='block';
    if(orbited){orbitHud.style.color='#80ffaa';orbitHud.style.borderColor='#1a6a3a';orbitHud.textContent='🟢 ORBIT LOCKED — descend slowly to land on '+cl.name;}
    else{orbitHud.style.color='#6b7ff5';orbitHud.style.borderColor='#1c1e3a';orbitHud.textContent=`⟳ Orbiting ${cl.name}: ${pct.toFixed(0)}% — need ${CONFIG.ORBIT_DEG_REQ}° to unlock`;}
  } else {
    if(orbitTracker.planet){orbitTracker.planet=null;orbitTracker.totalAngle=0;orbitTracker.landingWindow=false;}
    orbitHud.style.display='none';
  }
}

// ── Stars ─────────────────────────────────────────────────────────
let _stars=null;
const getStars=()=>(_stars||(_stars=Array.from({length:240},()=>({wx:(Math.random()-.5)*14000,wy:(Math.random()-.5)*14000,r:Math.random()*1.3+0.2,a:0.2+Math.random()*0.8}))));

// ── Draw planet ───────────────────────────────────────────────────
function drawPlanet(p){
  const{x,y}=wtc(p.wx,p.wy),r=p.radius*cam.zoom;if(r<1)return;
  const g1=ctx.createRadialGradient(x,y,r*.6,x,y,r*3);g1.addColorStop(0,p.color+'44');g1.addColorStop(1,p.color+'00');
  ctx.beginPath();ctx.arc(x,y,r*3,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  const g2=ctx.createRadialGradient(x-r*.28,y-r*.28,r*.05,x,y,r);
  g2.addColorStop(0,lighten(p.color,70));g2.addColorStop(.55,p.color);g2.addColorStop(1,darken(p.color,55));
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  ctx.strokeStyle=lighten(p.color,40)+'55';ctx.lineWidth=1;ctx.stroke();
  if(r>5){ctx.fillStyle='#ffffffbb';ctx.font=`${Math.max(9,Math.min(13,r*.35))}px Courier New`;ctx.textAlign='center';ctx.fillText(p.name,x,y+r+12*Math.max(cam.zoom,.4));}
  if(orbitTracker.planet===p&&sim&&sim.alive){
    const needed=CONFIG.ORBIT_DEG_REQ*Math.PI/180,pct=Math.min(1,Math.abs(orbitTracker.totalAngle)/needed);
    const arcEnd=orbitTracker.totalAngle>=0?-Math.PI/2+pct*needed:-Math.PI/2-pct*needed;
    ctx.beginPath();ctx.arc(x,y,(p.radius+14)*cam.zoom,-Math.PI/2,arcEnd,orbitTracker.totalAngle<0);
    ctx.strokeStyle=pct>=1?'rgba(100,255,160,.75)':'rgba(100,140,255,.45)';ctx.lineWidth=2.5;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  }
}

function drawField(){
  const step=Math.max(45,70/cam.zoom),tl=ctw(0,0),br=ctw(W,H);
  for(let gx=Math.floor(tl.x/step)*step;gx<br.x;gx+=step)for(let gy=Math.floor(tl.y/step)*step;gy<br.y;gy+=step){
    const{ax,ay}=gravity(gx,gy),mag=Math.sqrt(ax*ax+ay*ay);if(mag<.00008)continue;
    const len=Math.min(mag*350,16)*cam.zoom,nx=ax/mag,ny=ay/mag,alpha=Math.min(mag*55,.3),{x,y}=wtc(gx,gy);
    ctx.strokeStyle=`rgba(80,120,255,${alpha})`;ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+nx*len,y+ny*len);ctx.stroke();
  }
}
function drawGrid(){
  const step=200,tl=ctw(0,0),br=ctw(W,H);ctx.strokeStyle='rgba(255,255,255,.033)';ctx.lineWidth=.5;
  for(let gx=Math.floor(tl.x/step)*step;gx<br.x+step;gx+=step){const{x}=wtc(gx,0);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let gy=Math.floor(tl.y/step)*step;gy<br.y+step;gy+=step){const{y}=wtc(0,gy);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const o=wtc(0,0);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(o.x,0);ctx.lineTo(o.x,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,o.y);ctx.lineTo(W,o.y);ctx.stroke();
}
function drawVectors(wx,wy){
  const G=gv('grav')*.001;
  for(const p of planets){
    const dx=p.wx-wx,dy=p.wy-wy,d=Math.sqrt(dx*dx+dy*dy),f=G*p.mass/(d*d),len=Math.min(f*1000,70)*cam.zoom,nx=dx/d,ny=dy/d,s=wtc(wx,wy);
    ctx.save();ctx.strokeStyle=p.color+'99';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+nx*len,s.y+ny*len);ctx.stroke();ctx.setLineDash([]);
    ctx.translate(s.x+nx*len,s.y+ny*len);ctx.rotate(Math.atan2(ny,nx));
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-7,-3.5);ctx.lineTo(-7,3.5);ctx.closePath();ctx.fillStyle=p.color+'cc';ctx.fill();ctx.restore();
  }
}
function drawRocket(wx,wy,angle,fuelFrac,color){
  const{x,y}=wtc(wx,wy),s=Math.max(.5,cam.zoom);
  ctx.save();ctx.translate(x,y);ctx.rotate(-angle+Math.PI/2);
  ctx.beginPath();ctx.moveTo(0,-13*s);ctx.lineTo(5.5*s,6*s);ctx.lineTo(0,3*s);ctx.lineTo(-5.5*s,6*s);ctx.closePath();
  ctx.fillStyle=color;ctx.fill();ctx.strokeStyle=lighten(color,60);ctx.lineWidth=.8;ctx.stroke();
  if(fuelFrac>0){const fl=(4+Math.random()*5)*s;ctx.beginPath();ctx.moveTo(-2*s,6*s);ctx.lineTo(0,(6+fl)*s);ctx.lineTo(2*s,6*s);ctx.fillStyle=`rgba(255,${130+Math.random()*90|0},0,.9)`;ctx.fill();}
  ctx.restore();
}

// ── Main draw ─────────────────────────────────────────────────────
function draw(){
  ctx.fillStyle='#06070f';ctx.fillRect(0,0,W,H);
  getStars().forEach(s=>{const{x,y}=wtc(s.wx,s.wy);if(x<-2||x>W+2||y<-2||y>H+2)return;ctx.beginPath();ctx.arc(x,y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});
  if(document.getElementById('cgrid').checked)drawGrid();
  if(document.getElementById('cfield').checked)drawField();
  planets.forEach(drawPlanet);

  if(previewPath.length>1){
    ctx.save();ctx.setLineDash([5,4]);
    for(let i=1;i<previewPath.length;i++){const t=i/previewPath.length,a=wtc(previewPath[i-1][0],previewPath[i-1][1]),b=wtc(previewPath[i][0],previewPath[i][1]);ctx.strokeStyle=`rgba(100,190,255,${.72-t*.52})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
    ctx.setLineDash([]);ctx.restore();
    const ep=wtc(previewPath[previewPath.length-1][0],previewPath[previewPath.length-1][1]);
    ctx.beginPath();ctx.arc(ep.x,ep.y,5,0,Math.PI*2);ctx.strokeStyle='rgba(100,190,255,.5)';ctx.lineWidth=1.5;ctx.stroke();
  }
  if(simTrail.length>1){
    for(let i=1;i<simTrail.length;i++){const t=i/simTrail.length,ff=simTrail[i][2],a=wtc(simTrail[i-1][0],simTrail[i-1][1]),b=wtc(simTrail[i][0],simTrail[i][1]);ctx.strokeStyle=`rgba(${107+ff*148|0},${127+ff*53|0},255,${t*.7})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
  }

  const showVec=document.getElementById('cvec').checked;
  if(rocket&&!sim&&!simRunning){const ang=gv('angle')*Math.PI/180;drawRocket(rocket.wx,rocket.wy,ang,1,document.getElementById('rcol').value);if(showVec)drawVectors(rocket.wx,rocket.wy);}
  if(sim){
    const ang=Math.atan2(-sim.vy,sim.vx);drawRocket(sim.wx,sim.wy,ang,sim.alive?sim.fuel/sim.maxFuel:0,sim.color);
    if(showVec&&sim.alive)drawVectors(sim.wx,sim.wy);
    if(sim.crashed){const{x,y}=wtc(sim.wx,sim.wy);for(let i=0;i<10;i++){const ea=(i/10)*Math.PI*2+tick*.05,er=(6+(tick%22))*cam.zoom;ctx.beginPath();ctx.arc(x+Math.cos(ea)*er*.5,y+Math.sin(ea)*er*.5,3*cam.zoom,0,Math.PI*2);ctx.fillStyle=`rgba(255,${80+Math.random()*100|0},0,${.85-(tick%22)/25})`;ctx.fill();}}
    if(sim.landed){const{x,y}=wtc(sim.wx,sim.wy);ctx.fillStyle='rgba(80,255,140,.9)';ctx.font=`${Math.max(11,14*cam.zoom)}px Courier New`;ctx.textAlign='center';ctx.fillText('✅ LANDED',x,y-22*cam.zoom);}
    const spd=Math.sqrt(sim.vx*sim.vx+sim.vy*sim.vy);
    ctx.fillStyle='rgba(6,7,15,.78)';ctx.fillRect(8,8,162,72);ctx.fillStyle='#6b7ff5';ctx.font='10px Courier New';ctx.textAlign='left';
    ctx.fillText('SPD:  '+(spd*55).toFixed(1),14,22);ctx.fillText('FUEL: '+Math.max(0,sim.fuel).toFixed(0)+'/'+sim.maxFuel,14,36);
    const{ax,ay}=gravity(sim.wx,sim.wy);ctx.fillText('GRAV: '+Math.sqrt(ax*ax+ay*ay).toFixed(3),14,50);
    const sc=sim.alive?(sim.fuel>0?'#ffd080':'#a0c8ff'):(sim.landed?'#80ff80':sim.crashed?'#ff6060':'#ffaa40');
    ctx.fillStyle=sc;ctx.fillText(sim.alive?(sim.fuel>0?'THRUSTING':'COASTING'):(sim.landed?'LANDED on '+sim.landedOn:sim.crashed?'CRASHED':'ESCAPED'),14,64);
  }
  tick++;
}
function loop(){if(simRunning)for(let i=0;i<4;i++)stepSim();draw();requestAnimationFrame(loop);}
loop();

// ── Mouse pan ─────────────────────────────────────────────────────
let panning=false,panS={x:0,y:0},camS={x:0,y:0},panMoved=false;
cw.addEventListener('mousedown',e=>{if(mode==='addPlanet'||mode==='placeRocket')return;panning=true;panMoved=false;panS={x:e.clientX,y:e.clientY};camS={x:cam.x,y:cam.y};});
window.addEventListener('mousemove',e=>{if(!panning)return;const dx=e.clientX-panS.x,dy=e.clientY-panS.y;if(Math.abs(dx)>3||Math.abs(dy)>3)panMoved=true;cam.x=camS.x-dx/cam.zoom;cam.y=camS.y-dy/cam.zoom;});
window.addEventListener('mouseup',()=>{panning=false;});
cw.addEventListener('wheel',e=>{
  e.preventDefault();const r=cw.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const wB=ctw(mx,my),factor=e.deltaY<0?1.13:1/1.13;cam.zoom=Math.min(Math.max(cam.zoom*factor,.06),6);
  const wA=ctw(mx,my);cam.x-=wA.x-wB.x;cam.y-=wA.y-wB.y;
},{passive:false});

// ── Fit ───────────────────────────────────────────────────────────
function fitView(){
  if(!planets.length){cam.x=0;cam.y=0;cam.zoom=1;return;}
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  planets.forEach(p=>{x0=Math.min(x0,p.wx-p.radius);x1=Math.max(x1,p.wx+p.radius);y0=Math.min(y0,p.wy-p.radius);y1=Math.max(y1,p.wy+p.radius);});
  cam.zoom=Math.min(Math.max(Math.min((W*.82)/(x1-x0),(H*.82)/(y1-y0)),.06),6);cam.x=(x0+x1)/2;cam.y=(y0+y1)/2;
}
fitView();

// ── Touch pan + pinch ─────────────────────────────────────────────
let touches={},lastPinchDist=null,tPanStart=null,tCamStart=null,touchMoved=false;
cw.addEventListener('touchstart',e=>{
  e.preventDefault();Array.from(e.changedTouches).forEach(t=>{touches[t.identifier]=t;});
  const ids=Object.keys(touches);
  if(ids.length===1){const t=touches[ids[0]];tPanStart={x:t.clientX,y:t.clientY};tCamStart={x:cam.x,y:cam.y};touchMoved=false;}
  if(ids.length===2){const t0=touches[ids[0]],t1=touches[ids[1]],dx=t0.clientX-t1.clientX,dy=t0.clientY-t1.clientY;lastPinchDist=Math.sqrt(dx*dx+dy*dy);}
},{passive:false});
cw.addEventListener('touchmove',e=>{
  e.preventDefault();Array.from(e.changedTouches).forEach(t=>{touches[t.identifier]=t;});
  const ids=Object.keys(touches);
  if(ids.length===1&&tPanStart&&!(mode==='addPlanet'||mode==='placeRocket')){const t=touches[ids[0]],dx=t.clientX-tPanStart.x,dy=t.clientY-tPanStart.y;if(Math.abs(dx)>4||Math.abs(dy)>4)touchMoved=true;cam.x=tCamStart.x-dx/cam.zoom;cam.y=tCamStart.y-dy/cam.zoom;}
  if(ids.length===2&&lastPinchDist!==null){const t0=touches[ids[0]],t1=touches[ids[1]],dx=t0.clientX-t1.clientX,dy=t0.clientY-t1.clientY,dist=Math.sqrt(dx*dx+dy*dy);const r=cw.getBoundingClientRect(),mx=(t0.clientX+t1.clientX)/2-r.left,my=(t0.clientY+t1.clientY)/2-r.top;const wB=ctw(mx,my);cam.zoom=Math.min(Math.max(cam.zoom*(dist/lastPinchDist),.06),6);const wA=ctw(mx,my);cam.x-=wA.x-wB.x;cam.y-=wA.y-wB.y;lastPinchDist=dist;}
},{passive:false});
cw.addEventListener('touchend',e=>{
  e.preventDefault();Array.from(e.changedTouches).forEach(t=>{delete touches[t.identifier];});
  if(Object.keys(touches).length===0)lastPinchDist=null;
  if(!touchMoved&&e.changedTouches.length===1){const t=e.changedTouches[0],r=cw.getBoundingClientRect();handleTap(t.clientX-r.left,t.clientY-r.top);}
  tPanStart=null;
},{passive:false});

// ── Canvas tap ────────────────────────────────────────────────────
function handleTap(cx,cy){
  const{x:wx,y:wy}=ctw(cx,cy);
  if(mode==='addPlanet'){const pname=document.getElementById('pname').value||'Planet '+(++pcount);planets.push({wx,wy,mass:gv('pm'),radius:gv('pr'),color:document.getElementById('pc').value,name:pname});updatePList();setMode('placeRocket');document.getElementById('badd').textContent='Tap canvas to place';return;}
  if(mode==='placeRocket'||mode==='preview'){rocket={wx,wy};sim=null;simTrail=[];computePreview();setMode('preview');simRunning=false;}
}
cw.addEventListener('click',e=>{if(panning&&panMoved)return;const r=cw.getBoundingClientRect();handleTap(e.clientX-r.left,e.clientY-r.top);});

// ── Joystick (mobile angle control) ──────────────────────────────
const jZone=document.getElementById('mob-joystick-zone'),jNub=document.getElementById('mob-jnub');
let jActive=false,jId=null;const JR=38;
jZone.addEventListener('touchstart',e=>{e.stopPropagation();e.preventDefault();if(jActive)return;jActive=true;jId=e.changedTouches[0].identifier;},{passive:false});
window.addEventListener('touchmove',e=>{
  if(!jActive)return;
  for(const t of e.changedTouches){if(t.identifier!==jId)continue;
    const r=jZone.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=t.clientX-cx,dy=t.clientY-cy;const dist=Math.sqrt(dx*dx+dy*dy);if(dist>JR){dx=dx/dist*JR;dy=dy/dist*JR;}
    jNub.style.left=(r.width/2+dx)+'px';jNub.style.top=(r.height/2+dy)+'px';jNub.style.transform='none';
    const a=document.getElementById('angle');a.value=Math.round(((Math.atan2(-dy,dx)*180/Math.PI)+360)%360);syncL();if(mode==='preview')computePreview();
  }
},{passive:true});
window.addEventListener('touchend',e=>{for(const t of e.changedTouches){if(t.identifier===jId){jActive=false;jId=null;jNub.style.left='50%';jNub.style.top='50%';jNub.style.transform='translate(-50%,-50%)';}}},{passive:true});

// ── Button bindings ───────────────────────────────────────────────
const bindBtn=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn);};
const doReset=()=>{sim=null;simTrail=[];previewPath=[];rocket=null;simRunning=false;orbitHud.style.display='none';orbitTracker={planet:null,lastAngle:0,totalAngle:0,landingWindow:false};setMode('placeRocket');};
const doPrev=()=>{if(!rocket){setMode('placeRocket');return;}computePreview();setMode('preview');simRunning=false;sim=null;simTrail=[];};
const doLaunch=()=>{if(!rocket){document.getElementById('status').textContent='Place rocket first!';return;}startSim();};

bindBtn('bprev',doPrev);bindBtn('blaunch',doLaunch);bindBtn('breset',doReset);
bindBtn('badd',()=>{setMode('addPlanet');document.getElementById('badd').textContent='Tap canvas to place...';});
bindBtn('zp',()=>{cam.zoom=Math.min(cam.zoom*1.25,6);});bindBtn('zm',()=>{cam.zoom=Math.max(cam.zoom/1.25,.06);});bindBtn('zfit',fitView);
// mobile mirrors
bindBtn('mb-prev',doPrev);bindBtn('mb-launch',doLaunch);bindBtn('mb-reset',doReset);bindBtn('mb-fit',fitView);
bindBtn('mb-zp',()=>{cam.zoom=Math.min(cam.zoom*1.3,6);});bindBtn('mb-zm',()=>{cam.zoom=Math.max(cam.zoom/1.3,.06);});

// ── Planet list ───────────────────────────────────────────────────
function updatePList(){
  const list=document.getElementById('plist');list.innerHTML='';
  planets.forEach((p,i)=>{const d=document.createElement('div');d.className='pi';d.innerHTML=`<div class="dot" style="background:${p.color}"></div><span class="pn">${p.name} (m:${p.mass})</span><button data-i="${i}">✕</button>`;list.appendChild(d);});
  list.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{planets.splice(+b.dataset.i,1);updatePList();}));
}
updatePList();

// ── Keyboard ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&mode==='addPlanet')setMode('placeRocket');
  if(e.key==='+'||e.key==='=')cam.zoom=Math.min(cam.zoom*1.2,6);
  if(e.key==='-')cam.zoom=Math.max(cam.zoom/1.2,.06);
  if(e.key==='f'||e.key==='F')fitView();
  if(e.key==='r'||e.key==='R')doReset();
  if((e.key===' '||e.key==='Enter')&&mode!=='addPlanet'){e.preventDefault();doLaunch();}
});
</script>
