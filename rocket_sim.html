<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket Sim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#06070f;overflow:hidden}
#root{display:flex;flex-direction:column;background:#06070f;height:100vh;font-family:'Courier New',monospace}
#cw{flex:1;position:relative;overflow:hidden;min-height:0}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#ui{background:#0b0c1c;border-top:1px solid #1c1e3a;padding:7px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.grp{background:#0f1028;border:1px solid #1c1e3a;border-radius:8px;padding:6px 9px;display:flex;flex-direction:column;gap:4px;flex:1;min-width:105px}
.gl{font-size:9px;color:#404368;letter-spacing:.1em;text-transform:uppercase}
.cr{display:flex;align-items:center;gap:4px}
.cr label{font-size:10px;color:#707ab0;min-width:46px}
.cr input[type=range]{flex:1;height:3px;accent-color:#6b7ff5;min-width:40px}
.cr span{font-size:10px;color:#a8b0f0;min-width:28px;text-align:right}
.cr input[type=color]{width:22px;height:20px;border:none;background:none;cursor:pointer;padding:0}
.cr input[type=checkbox]{accent-color:#6b7ff5}
.btn{background:#151730;color:#7880b8;border:1px solid #222450;border-radius:6px;padding:4px 8px;font-size:10px;font-family:inherit;cursor:pointer;transition:background .12s;white-space:nowrap}
.btn:hover{background:#222450;color:#c0c8ff}
.btn.pri{background:#4a5ad0;color:#fff;border-color:#4a5ad0}.btn.pri:hover{background:#6b7ff5}
.btn.red{background:#6a1010;color:#ffaaaa;border-color:#6a1010}.btn.red:hover{background:#a02020;color:#fff}
.btn.grn{background:#0d4a28;color:#80ffaa;border-color:#0d4a28}.btn.grn:hover{background:#156b3a;color:#fff}
.btn.ora{background:#6a3a08;color:#ffcc80;border-color:#6a3a08}.btn.ora:hover{background:#a05a10;color:#fff}
#badge{font-size:9px;padding:2px 8px;border-radius:9px;background:#111438;color:#6b7ff5;border:1px solid #202860}
#status{font-size:10px;color:#5a60a0;flex:1}
#orbit-hud{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(6,7,15,0.85);border:1px solid #1c1e3a;border-radius:8px;padding:5px 14px;font-size:10px;color:#6b7ff5;display:none;white-space:nowrap;text-align:center;pointer-events:none;font-family:'Courier New',monospace}
.tabs{display:flex;gap:3px}
.tab{background:#0f1028;color:#404368;border:1px solid #1c1e3a;border-radius:5px;padding:3px 8px;font-size:9px;font-family:inherit;cursor:pointer}
.tab.on{background:#1c1e3a;color:#8890c8;border-color:#303480}
#plist{display:flex;flex-direction:column;gap:3px;max-height:75px;overflow-y:auto}
.pi{display:flex;gap:4px;align-items:center;background:#080918;border-radius:4px;padding:2px 5px;font-size:9px;color:#5868a0}
.pi .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pi .pn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi button{background:none;border:none;color:#5a2020;cursor:pointer;font-size:11px;padding:0 2px}
.pi button:hover{color:#e74c3c}
</style>
</head>
<body>
<div id="root">
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="orbit-hud"></div>
  </div>
  <div id="ui">
    <div class="row" style="justify-content:space-between">
      <div class="row" style="gap:5px"><span id="badge">PLACE ROCKET</span><span id="status">Click canvas to place rocket</span></div>
      <div class="row" style="gap:4px">
        <button class="btn" id="zm">-</button><button class="btn" id="zp">+</button><button class="btn" id="zfit">fit</button>
        <button class="btn pri" id="bprev">Preview</button>
        <button class="btn ora" id="blaunch">Launch</button>
        <button class="btn red" id="breset">Reset</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" data-t="rocket">Rocket</button>
      <button class="tab" data-t="planet">Planets</button>
      <button class="tab" data-t="sim">Sim</button>
    </div>
    <div id="t-rocket">
      <div class="row">
        <div class="grp"><div class="gl">Thrust</div>
          <div class="cr"><label>Power</label><input type="range" id="thrust" min="100" max="2500" value="700" step="10"><span id="vthrust">700</span></div>
          <div class="cr"><label>Angle</label><input type="range" id="angle" min="0" max="360" value="90" step="1"><span id="vangle">90°</span></div>
          <div class="cr"><label>Fuel</label><input type="range" id="fuel" min="50" max="900" value="400" step="10"><span id="vfuel">400</span></div>
        </div>
        <div class="grp"><div class="gl">Rocket</div>
          <div class="cr"><label>Mass</label><input type="range" id="mass" min="1" max="30" value="8" step="1"><span id="vmass">8</span></div>
          <div class="cr"><label>Burn</label><input type="range" id="burnrate" min="1" max="20" value="4" step="1"><span id="vburn">4</span></div>
          <div class="cr"><label>Color</label><input type="color" id="rcol" value="#6b7ff5"></div>
        </div>
      </div>
    </div>
    <div id="t-planet" style="display:none">
      <div class="row">
        <div class="grp"><div class="gl">New Planet</div>
          <div class="cr"><label>Mass</label><input type="range" id="pm" min="1000" max="25000" value="7000" step="100"><span id="vpm">7000</span></div>
          <div class="cr"><label>Radius</label><input type="range" id="pr" min="12" max="100" value="36" step="1"><span id="vpr">36</span></div>
          <div class="cr"><label>Color</label><input type="color" id="pc" value="#3a8fff"></div>
          <div class="cr"><label>Name</label><input type="text" id="pname" value="Planet" style="flex:1;background:#06070f;color:#8890c8;border:1px solid #222450;border-radius:4px;padding:1px 4px;font-size:10px;font-family:inherit"></div>
          <button class="btn grn" id="badd" style="width:100%;margin-top:3px">Place on canvas</button>
        </div>
        <div class="grp" style="flex:1.3"><div class="gl">Planets</div><div id="plist"></div></div>
      </div>
    </div>
    <div id="t-sim" style="display:none">
      <div class="row">
        <div class="grp"><div class="gl">Physics</div>
          <div class="cr"><label>Gravity</label><input type="range" id="grav" min="200" max="3000" value="900" step="10"><span id="vgrav">900</span></div>
          <div class="cr"><label>Time step</label><input type="range" id="dt" min="1" max="12" value="4" step="1"><span id="vdt">4</span></div>
          <div class="cr"><label>Drag</label><input type="range" id="drag" min="0" max="30" value="3" step="1"><span id="vdrag">3</span></div>
        </div>
        <div class="grp"><div class="gl">Display</div>
          <div class="cr"><label>Trail</label><input type="range" id="trail" min="30" max="600" value="200" step="10"><span id="vtrail">200</span></div>
          <div class="cr" style="gap:6px"><input type="checkbox" id="cvec" checked><label style="min-width:auto;cursor:pointer" for="cvec">Grav vectors</label></div>
          <div class="cr" style="gap:6px"><input type="checkbox" id="cfield"><label style="min-width:auto;cursor:pointer" for="cfield">Field lines</label></div>
          <div class="cr" style="gap:6px"><input type="checkbox" id="cgrid" checked><label style="min-width:auto;cursor:pointer" for="cgrid">Grid</label></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d'),cw=document.getElementById('cw'),orbitHud=document.getElementById('orbit-hud');
let W=0,H=0;
function resize(){const r=cw.getBoundingClientRect();W=canvas.width=Math.floor(r.width)||600;H=canvas.height=Math.floor(r.height)||420;}
resize();new ResizeObserver(resize).observe(cw);

const cam={x:0,y:0,zoom:1};
let panning=false,panS={x:0,y:0},camS={x:0,y:0},panMoved=false;
function wtc(wx,wy){return{x:(wx-cam.x)*cam.zoom+W/2,y:(wy-cam.y)*cam.zoom+H/2};}
function ctw(cx,cy){return{x:(cx-W/2)/cam.zoom+cam.x,y:(cy-H/2)/cam.zoom+cam.y};}

const PLANETS_DEFAULT=[
  {wx:0,wy:80,mass:9000,radius:52,color:'#3a8fff',name:'Earth'},
  {wx:-650,wy:-280,mass:3200,radius:28,color:'#e06030',name:'Mars'},
  {wx:720,wy:-240,mass:5000,radius:40,color:'#c8a820',name:'Venus'},
  {wx:-950,wy:430,mass:2000,radius:20,color:'#d060d0',name:'Pluto'},
  {wx:550,wy:620,mass:14000,radius:72,color:'#c07828',name:'Jupiter'},
  {wx:-420,wy:720,mass:1800,radius:18,color:'#60b0e0',name:'Uranus'},
  {wx:960,wy:200,mass:6000,radius:46,color:'#e8b050',name:'Saturn'},
];
let planets=PLANETS_DEFAULT.map(p=>({...p}));
let rocket=null,sim=null,simTrail=[],previewPath=[],mode='placeRocket',tick=0,simRunning=false,pcount=PLANETS_DEFAULT.length;

function gv(id){return parseFloat(document.getElementById(id).value);}
const SLIDERS=[['thrust','vthrust',''],['angle','vangle','°'],['fuel','vfuel',''],['mass','vmass',''],['burnrate','vburn',''],['pm','vpm',''],['pr','vpr',''],['grav','vgrav',''],['dt','vdt',''],['drag','vdrag',''],['trail','vtrail','']];
function syncL(){SLIDERS.forEach(([id,vid,s])=>{const e=document.getElementById(id),v=document.getElementById(vid);if(e&&v)v.textContent=e.value+s;});}
document.querySelectorAll('input[type=range]').forEach(el=>el.addEventListener('input',()=>{syncL();if(mode==='preview')computePreview();}));
syncL();

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  ['rocket','planet','sim'].forEach(n=>{document.getElementById('t-'+n).style.display=t.dataset.t===n?'':'none';});
}));

function setMode(m){
  mode=m;
  const L={placeRocket:['PLACE ROCKET','Click canvas to set rocket start position'],addPlanet:['ADD PLANET','Click canvas to place planet'],preview:['PREVIEW','Adjust settings then Launch — orbit to land!'],simulating:['SIMULATING','Orbit a planet tangentially to land safely']};
  document.getElementById('badge').textContent=L[m][0];document.getElementById('status').textContent=L[m][1];
}

function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lighten(h,a){const[r,g,b]=hex2rgb(h);return'#'+[r,g,b].map(v=>Math.min(255,v+a).toString(16).padStart(2,'0')).join('');}
function darken(h,a){const[r,g,b]=hex2rgb(h);return'#'+[r,g,b].map(v=>Math.max(0,v-a).toString(16).padStart(2,'0')).join('');}

function gravity(px,py){
  const G=gv('grav')*0.001;
  let ax=0,ay=0;
  for(const p of planets){const dx=p.wx-px,dy=p.wy-py,d2=dx*dx+dy*dy,d=Math.sqrt(d2);if(d<2)continue;const f=G*p.mass/d2;ax+=f*dx/d;ay+=f*dy/d;}
  return{ax,ay};
}

function simulatePath(sx,sy,vx0,vy0,fuel0,steps){
  const brate=gv('burnrate'),thrust=gv('thrust'),mass=gv('mass'),dragC=gv('drag')*0.00006,dt=gv('dt')*0.016;
  let px=sx,py=sy,vx=vx0,vy=vy0,fuel=fuel0;
  const path=[[px,py]];
  for(let i=0;i<steps;i++){
    const{ax,ay}=gravity(px,py);let tx=0,ty=0;
    if(fuel>0){const ang=gv('angle')*Math.PI/180;const thf=thrust/(mass+fuel*0.008);tx=Math.cos(ang)*thf*0.01;ty=-Math.sin(ang)*thf*0.01;fuel-=brate*dt;}
    vx+=(ax+tx)*dt-vx*dragC;vy+=(ay+ty)*dt-vy*dragC;px+=vx*dt;py+=vy*dt;
    path.push([px,py]);
    let hit=false;for(const p of planets){const dx=px-p.wx,dy=py-p.wy;if(Math.sqrt(dx*dx+dy*dy)<p.radius+6){hit=true;break;}}
    if(hit||Math.abs(px)>5000||Math.abs(py)>5000)break;
  }
  return path;
}
function computePreview(){if(!rocket)return;const ang=gv('angle')*Math.PI/180;previewPath=simulatePath(rocket.wx,rocket.wy,Math.cos(ang)*0.2,-Math.sin(ang)*0.2,gv('fuel'),4000);}

let orbitTracker={planet:null,lastAngle:0,totalAngle:0,landingWindow:false};

function startSim(){
  if(!rocket)return;
  const ang=gv('angle')*Math.PI/180;
  sim={wx:rocket.wx,wy:rocket.wy,vx:Math.cos(ang)*0.2,vy:-Math.sin(ang)*0.2,fuel:gv('fuel'),maxFuel:gv('fuel'),color:document.getElementById('rcol').value,alive:true,crashed:false,escaped:false,landed:false,landedOn:null};
  simTrail=[];previewPath=[];simRunning=true;
  orbitTracker={planet:null,lastAngle:0,totalAngle:0,landingWindow:false};
  setMode('simulating');
}

function getClosestPlanet(wx,wy){
  let best=null,bestD=Infinity;
  for(const p of planets){const dx=wx-p.wx,dy=wy-p.wy,d=Math.sqrt(dx*dx+dy*dy)-p.radius;if(d<bestD){bestD=d;best=p;}}
  return{planet:best,dist:bestD};
}

function stepSim(){
  if(!sim||!sim.alive)return;
  const brate=gv('burnrate'),thrust=gv('thrust'),mass=gv('mass'),dragC=gv('drag')*0.00006,dt=gv('dt')*0.016;
  const{ax,ay}=gravity(sim.wx,sim.wy);let tx=0,ty=0;
  if(sim.fuel>0){const ang=gv('angle')*Math.PI/180;const thf=thrust/(mass+sim.fuel*0.008);tx=Math.cos(ang)*thf*0.01;ty=-Math.sin(ang)*thf*0.01;sim.fuel-=brate*dt;if(sim.fuel<0)sim.fuel=0;}
  sim.vx+=(ax+tx)*dt-sim.vx*dragC;sim.vy+=(ay+ty)*dt-sim.vy*dragC;sim.wx+=sim.vx*dt;sim.wy+=sim.vy*dt;
  simTrail.push([sim.wx,sim.wy,sim.fuel/sim.maxFuel]);
  if(simTrail.length>gv('trail'))simTrail.shift();

  for(const p of planets){
    const dx=sim.wx-p.wx,dy=sim.wy-p.wy,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<p.radius+6){
      const radialVx=sim.vx*(dx/dist),radialVy=sim.vy*(dy/dist);
      const impactSpd=Math.abs(radialVx+radialVy);
      if(impactSpd<1.8&&orbitTracker.landingWindow){
        sim.alive=false;sim.landed=true;sim.landedOn=p.name;simRunning=false;
        orbitHud.style.display='none';
        document.getElementById('status').textContent='Landed on '+p.name+'!';
      } else {
        sim.alive=false;sim.crashed=true;simRunning=false;
        orbitHud.style.display='none';
        document.getElementById('status').textContent='Crashed into '+p.name+'! (impact: '+impactSpd.toFixed(1)+', need orbit first)';
      }
      return;
    }
  }
  if(Math.abs(sim.wx)>5000||Math.abs(sim.wy)>5000){sim.alive=false;sim.escaped=true;simRunning=false;orbitHud.style.display='none';document.getElementById('status').textContent='Escaped to space!';return;}

  const{planet:closest,dist:closestDist}=getClosestPlanet(sim.wx,sim.wy);
  const orbitRange=closest.radius*4.5;
  if(closestDist<orbitRange){
    const angleNow=Math.atan2(sim.wy-closest.wy,sim.wx-closest.wx);
    if(orbitTracker.planet===closest){
      let da=angleNow-orbitTracker.lastAngle;
      if(da>Math.PI)da-=2*Math.PI;if(da<-Math.PI)da+=2*Math.PI;
      orbitTracker.totalAngle+=da;
    } else {
      orbitTracker.planet=closest;orbitTracker.totalAngle=0;
    }
    orbitTracker.lastAngle=angleNow;
    const orbited=Math.abs(orbitTracker.totalAngle)>=(Math.PI*1.5);
    orbitTracker.landingWindow=orbited;
    const pct=Math.min(100,Math.abs(orbitTracker.totalAngle)/(Math.PI*1.5)*100);
    orbitHud.style.display='block';
    if(orbited){
      orbitHud.style.color='#80ffaa';orbitHud.style.borderColor='#1a6a3a';
      orbitHud.textContent='ORBIT ESTABLISHED — descend to land on '+closest.name;
    } else {
      orbitHud.style.color='#6b7ff5';orbitHud.style.borderColor='#1c1e3a';
      orbitHud.textContent='Orbiting '+closest.name+': '+pct.toFixed(0)+'% — need 270° to unlock landing';
    }
  } else {
    if(orbitTracker.planet){orbitTracker.planet=null;orbitTracker.totalAngle=0;orbitTracker.landingWindow=false;}
    orbitHud.style.display='none';
  }
}

let _stars=null;
function getStars(){if(!_stars)_stars=Array.from({length:220},()=>({wx:(Math.random()-0.5)*12000,wy:(Math.random()-0.5)*12000,r:Math.random()*1.2+0.2,a:0.2+Math.random()*0.8}));return _stars;}

function drawPlanet(p){
  const{x,y}=wtc(p.wx,p.wy);const r=p.radius*cam.zoom;if(r<1)return;
  const g1=ctx.createRadialGradient(x,y,r*0.6,x,y,r*2.8);g1.addColorStop(0,p.color+'40');g1.addColorStop(1,p.color+'00');
  ctx.beginPath();ctx.arc(x,y,r*2.8,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
  const g2=ctx.createRadialGradient(x-r*0.28,y-r*0.28,r*0.05,x,y,r);
  g2.addColorStop(0,lighten(p.color,70));g2.addColorStop(0.55,p.color);g2.addColorStop(1,darken(p.color,55));
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
  ctx.strokeStyle=lighten(p.color,40)+'55';ctx.lineWidth=1;ctx.stroke();
  if(r>5){ctx.fillStyle='#ffffffbb';ctx.font=`${Math.max(9,Math.min(12,r*0.38))}px Courier New`;ctx.textAlign='center';ctx.fillText(p.name,x,y+r+11*Math.max(cam.zoom,0.5));}
  if(orbitTracker.planet===p&&sim&&sim.alive){
    const pct=Math.min(1,Math.abs(orbitTracker.totalAngle)/(Math.PI*1.5));
    const arcEnd=orbitTracker.totalAngle>=0?-Math.PI/2+pct*Math.PI*1.5:-Math.PI/2-pct*Math.PI*1.5;
    ctx.beginPath();ctx.arc(x,y,(p.radius+12)*cam.zoom,-Math.PI/2,arcEnd,orbitTracker.totalAngle<0);
    ctx.strokeStyle=pct>=1?'rgba(100,255,160,0.7)':'rgba(100,140,255,0.4)';ctx.lineWidth=2;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  }
}

function drawField(){
  const step=Math.max(45,75/cam.zoom);const tl=ctw(0,0),br=ctw(W,H);
  for(let gx=Math.floor(tl.x/step)*step;gx<br.x;gx+=step){
    for(let gy=Math.floor(tl.y/step)*step;gy<br.y;gy+=step){
      const{ax,ay}=gravity(gx,gy);const mag=Math.sqrt(ax*ax+ay*ay);if(mag<0.00008)continue;
      const len=Math.min(mag*350,16)*cam.zoom,nx=ax/mag,ny=ay/mag,alpha=Math.min(mag*55,0.3);
      const{x,y}=wtc(gx,gy);
      ctx.strokeStyle=`rgba(80,120,255,${alpha})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+nx*len,y+ny*len);ctx.stroke();
    }
  }
}

function drawGrid(){
  const step=200;const tl=ctw(0,0),br=ctw(W,H);
  ctx.strokeStyle='rgba(255,255,255,0.035)';ctx.lineWidth=0.5;
  for(let gx=Math.floor(tl.x/step)*step;gx<br.x+step;gx+=step){const{x}=wtc(gx,0);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let gy=Math.floor(tl.y/step)*step;gy<br.y+step;gy+=step){const{y}=wtc(0,gy);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const o=wtc(0,0);ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(o.x,0);ctx.lineTo(o.x,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,o.y);ctx.lineTo(W,o.y);ctx.stroke();
}

function drawVectors(wx,wy){
  const G=gv('grav')*0.001;
  for(const p of planets){
    const dx=p.wx-wx,dy=p.wy-wy,d=Math.sqrt(dx*dx+dy*dy);
    const f=G*p.mass/(d*d),len=Math.min(f*1000,70)*cam.zoom,nx=dx/d,ny=dy/d;
    const s=wtc(wx,wy);
    ctx.save();ctx.strokeStyle=p.color+'99';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x+nx*len,s.y+ny*len);ctx.stroke();ctx.setLineDash([]);
    const ang=Math.atan2(ny,nx);ctx.translate(s.x+nx*len,s.y+ny*len);ctx.rotate(ang);
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-7,-3.5);ctx.lineTo(-7,3.5);ctx.closePath();ctx.fillStyle=p.color+'cc';ctx.fill();ctx.restore();
  }
}

function drawRocket(wx,wy,angle,fuelFrac,color){
  const{x,y}=wtc(wx,wy);const s=Math.max(0.5,cam.zoom);
  ctx.save();ctx.translate(x,y);ctx.rotate(-angle+Math.PI/2);
  ctx.beginPath();ctx.moveTo(0,-13*s);ctx.lineTo(5.5*s,6*s);ctx.lineTo(0,3*s);ctx.lineTo(-5.5*s,6*s);ctx.closePath();
  ctx.fillStyle=color;ctx.fill();ctx.strokeStyle=lighten(color,60);ctx.lineWidth=0.8;ctx.stroke();
  if(fuelFrac>0){const fl=(4+Math.random()*5)*s;ctx.beginPath();ctx.moveTo(-2*s,6*s);ctx.lineTo(0,(6+fl)*s);ctx.lineTo(2*s,6*s);ctx.fillStyle=`rgba(255,${130+Math.random()*90|0},0,0.9)`;ctx.fill();}
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#06070f';ctx.fillRect(0,0,W,H);
  getStars().forEach(s=>{const{x,y}=wtc(s.wx,s.wy);if(x<-2||x>W+2||y<-2||y>H+2)return;ctx.beginPath();ctx.arc(x,y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});
  if(document.getElementById('cgrid').checked)drawGrid();
  if(document.getElementById('cfield').checked)drawField();
  planets.forEach(drawPlanet);

  if(previewPath.length>1){
    ctx.save();ctx.setLineDash([5,4]);
    for(let i=1;i<previewPath.length;i++){
      const t=i/previewPath.length;
      const a=wtc(previewPath[i-1][0],previewPath[i-1][1]),b=wtc(previewPath[i][0],previewPath[i][1]);
      ctx.strokeStyle=`rgba(100,190,255,${0.7-t*0.5})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
    ctx.setLineDash([]);ctx.restore();
    const ep=wtc(previewPath[previewPath.length-1][0],previewPath[previewPath.length-1][1]);
    ctx.beginPath();ctx.arc(ep.x,ep.y,5,0,Math.PI*2);ctx.strokeStyle='rgba(100,190,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
  }

  if(simTrail.length>1){
    for(let i=1;i<simTrail.length;i++){
      const t=i/simTrail.length,ff=simTrail[i][2];
      const a=wtc(simTrail[i-1][0],simTrail[i-1][1]),b=wtc(simTrail[i][0],simTrail[i][1]);
      ctx.strokeStyle=`rgba(${107+ff*148|0},${127+ff*53|0},255,${t*0.7})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    }
  }

  const showVec=document.getElementById('cvec').checked;
  if(rocket&&!sim&&!simRunning){
    const ang=gv('angle')*Math.PI/180;
    drawRocket(rocket.wx,rocket.wy,ang,1,document.getElementById('rcol').value);
    if(showVec)drawVectors(rocket.wx,rocket.wy);
  }

  if(sim){
    const ang=Math.atan2(-sim.vy,sim.vx);
    const ff=sim.alive?sim.fuel/sim.maxFuel:0;
    drawRocket(sim.wx,sim.wy,ang,ff,sim.color);
    if(showVec&&sim.alive)drawVectors(sim.wx,sim.wy);

    if(sim.crashed){
      const{x,y}=wtc(sim.wx,sim.wy);
      for(let i=0;i<10;i++){
        const ea=(i/10)*Math.PI*2+tick*0.05,er=(6+(tick%22))*cam.zoom;
        ctx.beginPath();ctx.arc(x+Math.cos(ea)*er*0.5,y+Math.sin(ea)*er*0.5,3*cam.zoom,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,${80+Math.random()*100|0},0,${0.85-(tick%22)/25})`;ctx.fill();
      }
    }
    if(sim.landed){
      const{x,y}=wtc(sim.wx,sim.wy);
      ctx.fillStyle='rgba(80,255,140,0.85)';ctx.font=`${Math.max(11,14*cam.zoom)}px Courier New`;
      ctx.textAlign='center';ctx.fillText('LANDED',x,y-20*cam.zoom);
    }

    const spd=Math.sqrt(sim.vx*sim.vx+sim.vy*sim.vy);
    ctx.fillStyle='rgba(6,7,15,0.75)';ctx.fillRect(8,8,150,68);
    ctx.fillStyle='#6b7ff5';ctx.font='10px Courier New';ctx.textAlign='left';
    ctx.fillText('SPD:  '+(spd*55).toFixed(1),14,22);
    ctx.fillText('FUEL: '+Math.max(0,sim.fuel).toFixed(0)+'/'+sim.maxFuel,14,36);
    const{ax,ay}=gravity(sim.wx,sim.wy);
    ctx.fillText('GRAV: '+Math.sqrt(ax*ax+ay*ay).toFixed(3),14,50);
    const stateColor=sim.alive?(sim.fuel>0?'#ffd080':'#a0c8ff'):(sim.landed?'#80ff80':sim.crashed?'#ff6060':'#ffaa40');
    ctx.fillStyle=stateColor;
    ctx.fillText(sim.alive?(sim.fuel>0?'THRUSTING':'COASTING'):(sim.landed?'LANDED on '+sim.landedOn:sim.crashed?'CRASHED':'ESCAPED'),14,64);
  }
  tick++;
}

function loop(){if(simRunning)for(let i=0;i<4;i++)stepSim();draw();requestAnimationFrame(loop);}
loop();

cw.addEventListener('mousedown',e=>{
  if(mode==='addPlanet'||mode==='placeRocket')return;
  panning=true;panMoved=false;panS={x:e.clientX,y:e.clientY};camS={x:cam.x,y:cam.y};
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  const dx=e.clientX-panS.x,dy=e.clientY-panS.y;
  if(Math.abs(dx)>3||Math.abs(dy)>3)panMoved=true;
  cam.x=camS.x-dx/cam.zoom;cam.y=camS.y-dy/cam.zoom;
});
window.addEventListener('mouseup',()=>{panning=false;});

cw.addEventListener('wheel',e=>{
  e.preventDefault();const r=cw.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const wB=ctw(mx,my);const factor=e.deltaY<0?1.13:1/1.13;
  cam.zoom=Math.min(Math.max(cam.zoom*factor,0.06),6);
  const wA=ctw(mx,my);cam.x-=wA.x-wB.x;cam.y-=wA.y-wB.y;
},{passive:false});

function fitView(){
  if(!planets.length){cam.x=0;cam.y=0;cam.zoom=1;return;}
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  planets.forEach(p=>{x0=Math.min(x0,p.wx-p.radius);x1=Math.max(x1,p.wx+p.radius);y0=Math.min(y0,p.wy-p.radius);y1=Math.max(y1,p.wy+p.radius);});
  cam.zoom=Math.min(Math.max(Math.min((W*0.82)/(x1-x0),(H*0.82)/(y1-y0)),0.06),6);
  cam.x=(x0+x1)/2;cam.y=(y0+y1)/2;
}
fitView();

document.getElementById('zp').addEventListener('click',()=>{cam.zoom=Math.min(cam.zoom*1.25,6);});
document.getElementById('zm').addEventListener('click',()=>{cam.zoom=Math.max(cam.zoom/1.25,0.06);});
document.getElementById('zfit').addEventListener('click',fitView);

cw.addEventListener('click',e=>{
  if(panning&&panMoved)return;
  const r=cw.getBoundingClientRect();const{x:wx,y:wy}=ctw(e.clientX-r.left,e.clientY-r.top);
  if(mode==='addPlanet'){
    const pname=document.getElementById('pname').value||'Planet '+(++pcount);
    planets.push({wx,wy,mass:gv('pm'),radius:gv('pr'),color:document.getElementById('pc').value,name:pname});
    updatePList();setMode('placeRocket');document.getElementById('badd').textContent='Place on canvas';return;
  }
  if(mode==='placeRocket'||mode==='preview'){
    rocket={wx,wy};sim=null;simTrail=[];computePreview();setMode('preview');simRunning=false;
  }
});

document.getElementById('bprev').addEventListener('click',()=>{if(!rocket){setMode('placeRocket');return;}computePreview();setMode('preview');simRunning=false;sim=null;simTrail=[];});
document.getElementById('blaunch').addEventListener('click',()=>{if(!rocket){document.getElementById('status').textContent='Place rocket first!';return;}startSim();});
document.getElementById('breset').addEventListener('click',()=>{sim=null;simTrail=[];previewPath=[];rocket=null;simRunning=false;orbitHud.style.display='none';orbitTracker={planet:null,lastAngle:0,totalAngle:0,landingWindow:false};setMode('placeRocket');});
document.getElementById('badd').addEventListener('click',()=>{setMode('addPlanet');document.getElementById('badd').textContent='Click canvas to place...';});

function updatePList(){
  const list=document.getElementById('plist');list.innerHTML='';
  planets.forEach((p,i)=>{
    const d=document.createElement('div');d.className='pi';
    d.innerHTML=`<div class="dot" style="background:${p.color}"></div><span class="pn">${p.name}</span><button data-i="${i}">x</button>`;
    list.appendChild(d);
  });
  list.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{planets.splice(+b.dataset.i,1);updatePList();}));
}
updatePList();

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&mode==='addPlanet')setMode('placeRocket');
  if(e.key==='+'||e.key==='=')cam.zoom=Math.min(cam.zoom*1.2,6);
  if(e.key==='-')cam.zoom=Math.max(cam.zoom/1.2,0.06);
  if(e.key==='f'||e.key==='F')fitView();
});
</script>
</body>
</html>
